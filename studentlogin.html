<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-AI | Student Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { justify-content: center; align-items: center; background: #f0f2f5; }
        .login-box {
            background: white; border-radius: 14px;
            padding: 50px 45px; width: 100%; max-width: 420px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
        .login-logo .logo-sq {
            width: 38px; height: 38px; background: #ffb400; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: #08203a; font-weight: bold; font-size: 1.2rem;
        }
        .login-logo span { font-weight: bold; letter-spacing: 1px; font-size: 1.1rem; color: #08203a; }
        .login-box h2 { font-size: 1.4rem; color: #08203a; margin-bottom: 6px; }
        .login-box p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0;
            border-radius: 8px; font-size: 0.95rem; color: #333;
            outline: none; transition: border 0.2s;
        }
        .form-group input:focus { border-color: #08203a; }
        .login-btn {
            width: 100%; padding: 13px; background: #08203a; color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: background 0.2s; margin-top: 8px;
        }
        .login-btn:hover { background: #0d2e52; }
        .login-note { text-align: center; font-size: 0.82rem; color: #aaa; margin-top: 20px; }
        .login-note span { color: #ffb400; font-weight: bold; }
        .error-msg { background: #fff0f0; color: #b91c1c; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">
            <div class="logo-sq">S</div>
            <span>SENTINEL-AI</span>
        </div>
        <h2>Student Portal</h2>
        <p>Sign in with your school credentials to continue.</p>
        <div class="error-msg" id="errorMsg"></div>
        <div class="form-group">
            <label>Student ID</label>
            <input type="text" id="studentId" placeholder="e.g. STU-2024-001" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" />
        </div>
        <button class="login-btn" onclick="handleLogin()">Sign In</button>
        <p class="login-note">Protected by <span>Sentinel-AI</span> Integrity System</p>
    </div>
    <script>
        function handleLogin() {
            const id  = document.getElementById('studentId').value.trim();
            const pw  = document.getElementById('password').value.trim();
            const err = document.getElementById('errorMsg');
            if (!id || !pw) {
                err.style.display = 'block';
                err.textContent = 'Please enter your Student ID and password.';
                return;
            }
            err.style.display = 'none';
            localStorage.setItem('student_name', 'Kendrick Lamar');
            localStorage.setItem('student_id', id);
            window.location.href = 'student-dashboard.html';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
